name: AntiGravity Neural Sync

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          
      - name: Run AntiGravity Suite
        run: |
          python .ai/tools/ag_git_pulse.py
          python .ai/tools/ag_dep_hoister.py
          python .ai/tools/ag_readme_gen.py
          
      - name: Commit documentation changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "docs: automated neural documentation sync" || echo "No changes to commit"
          git push
